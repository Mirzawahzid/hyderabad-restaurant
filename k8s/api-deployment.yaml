apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-api
  namespace: hydrabadi-restaurant
  labels:
    app: restaurant-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-api
  template:
    metadata:
      labels:
        app: restaurant-api
        tier: backend
    spec:
      containers:
        - name: restaurant-api
          image: hydrabadi-restaurant-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: restaurant-config
            - secretRef:
                name: restaurant-secrets
          livenessProbe:
            httpGet:
              path: /api/Menu
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/Menu
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
