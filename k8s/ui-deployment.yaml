apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-ui
  namespace: hydrabadi-restaurant
  labels:
    app: restaurant-ui
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-ui
  template:
    metadata:
      labels:
        app: restaurant-ui
        tier: frontend
    spec:
      containers:
        - name: restaurant-ui
          image: hydrabadi-restaurant-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: REACT_APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: restaurant-config
                  key: API_BASE_URL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
